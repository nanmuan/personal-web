<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人主页</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f7f7f7;
      color: #333;
      line-height: 1.6;
    }

    header {
      text-align: center;
      padding: 60px 20px 30px;
    }

    header h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    header p {
      color: #777;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }

    nav a {
      text-decoration: none;
      color: #555;
      transition: 0.3s;
    }

    nav a:hover {
      color: #000;
    }

    section {
      max-width: 800px;
      margin: 0 auto 60px;
      padding: 0 20px;
    }

    .card {
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      margin-bottom: 20px;
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #aaa;
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 2rem; }
    }
  </style>
</head>
<body>

  <header>
    <h1>王航</h1>
    <p>一个热爱数据分析与技术的人</p>
  </header>

  <nav>
    <a href="#about">关于我</a>
    <a href="#projects">项目</a>
    <a href="#contact">联系</a>
  </nav>

  <section id="about">
    <div class="card">
      <h2>关于我</h2>
      <p>我是湖北第二师范学院材料物理(新能源方向)专业的全日制本科生。</p>
    </div>
  </section>

  <section id="projects">
    <div class="card">
      <h2>项目1</h2>
      <p>电镀法制备镍铁氧化物催化电极工艺及其OER性能研究
</p>
    </div>

    <div class="card">
      <h2>项目2</h2>
      <p>利用TMR效应自制三维空间磁场测量系统 (1)</p>
    </div>
  </section>

  <section id="contact">
    <div class="card">
      <h2>联系我</h2>
      <p>Email: puzi13120@qq.com</p>
    </div>
  </section>

  <footer>
    © 2026 王航
  </footer>

</body>
</html>
