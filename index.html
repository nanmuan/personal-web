<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>个人主页</title>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: linear-gradient(180deg, #f5f5f7, #e5e5ea);
      --text: #1d1d1f;
      --card: rgba(255,255,255,0.6);
      --border: rgba(255,255,255,0.3);
    }

    body.dark {
      --bg: linear-gradient(180deg, #0f0f10, #1c1c1e);
      --text: #f5f5f7;
      --card: rgba(30,30,30,0.6);
      --border: rgba(255,255,255,0.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      transition: all 0.4s ease;
    }

    header {
      text-align: center;
      padding: 80px 20px 40px;
      position: relative;
    }

    header h1 {
      font-size: 3rem;
      font-weight: 600;
      letter-spacing: -1px;
    }

    header p {
      margin-top: 10px;
      opacity: 0.7;
    }

    .toggle-btn {
      position: absolute;
      right: 20px;
      top: 20px;
      border: none;
      padding: 10px 16px;
      border-radius: 999px;
      backdrop-filter: blur(10px);
      background: var(--card);
      border: 1px solid var(--border);
      cursor: pointer;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-bottom: 60px;
    }

    nav a {
      text-decoration: none;
      font-size: 0.95rem;
      opacity: 0.6;
      transition: 0.3s;
    }

    nav a:hover {
      opacity: 1;
    }

    section {
      max-width: 900px;
      margin: 0 auto 60px;
      padding: 0 20px;
    }

    .card {
      backdrop-filter: blur(20px);
      background: var(--card);
      border: 1px solid var(--border);
      padding: 30px;
      border-radius: 24px;
      margin-bottom: 20px;
      transition: all 0.3s ease;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.1);
    }

    h2 {
      margin-bottom: 10px;
      font-weight: 600;
    }

    footer {
      text-align: center;
      padding: 40px;
      font-size: 0.85rem;
      opacity: 0.5;
    }

    @media (max-width: 600px) {
      header h1 { font-size: 2.2rem; }
    }
  </style>
</head>

<body>

  <header>
    <button class="toggle-btn" onclick="toggleTheme()">🌗</button>
    <h1>王航</h1>
    <p>Data · Electrochemistry · Analysis</p>
  </header>

  <nav>
    <a href="#about">About</a>
    <a href="#projects">Projects</a>
    <a href="#contact">Contact</a>
  </nav>

  <section id="about">
    <div class="card">
      <h2>About Me</h2>
      <p>我是湖北第二师范学院材料物理(新能源方向)专业的全日制本科生。</p>
    </div>
  </section>

  <section id="projects">
    <div class="card">
      <h2>Electrochemistry Project</h2>
      <p>电镀法制备镍铁氧化物催化电极工艺及其OER性能研究</p>
    </div>

    <div class="card">
      <h2>Data Analysis Project</h2>
      <p>利用TMR效应自制三维空间磁场测量系统</p>
    </div>
  </section>

  <section id="contact">
    <div class="card">
      <h2>Contact</h2>
      <p>Email: puzi13120@qq.com</p>
    </div>
  </section>

  <footer>
    © 2026 王航
  </footer>

  <script>
    function toggleTheme() {
      document.body.classList.toggle('dark');
      localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
    }

    window.onload = function() {
      const savedTheme = localStorage.getItem('theme');
      if (savedTheme === 'dark') {
        document.body.classList.add('dark');
      }
    }
  </script>

</body>
</html>
